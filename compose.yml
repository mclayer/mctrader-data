# mctrader-data Pilot — Docker-first compose (CFP-128 / ADR-033 §7.4 mandate)
# §7.4 OpRiskArch 4 항목 박제:
#   - restart policy: unless-stopped (forward-only, 데이터 누락 회피)
#   - volume DR: named volume mctrader_data (host path leak 방지)
#   - health check: HTTP /health endpoint (interval 30s, start_period 60s)
#   - network mode: bridge default, 호스트 port 매핑 0 (HealthServer = container 내부)

services:
  collector:
    build: .
    image: mctrader-data:pilot
    container_name: mctrader-collector
    restart: unless-stopped
    # MCT-103: 50-symbol universe (scored selection, see docs/stories/MCT-103.md in mctrader-hub).
    # Override Dockerfile CMD `--top-n 10` (raw volume) with explicit scored 50.
    # Forward-only invariant (ADR-009 §D12): all symbols collected from this commit forward,
    # no historical backfill possible. Universe rebalance = monthly only (preserve history of dropped syms).
    command:
      - "collect"
      - "--symbols"
      - "KRW-XRP,KRW-SOL,KRW-VIRTUAL,KRW-DOGE,KRW-USDT,KRW-ETH,KRW-WLD,KRW-TON,KRW-ONDO,KRW-STRK,KRW-POLA,KRW-SUI,KRW-ADA,KRW-XLM,KRW-ETC,KRW-BTC,KRW-PEPE,KRW-SHIB,KRW-LINK,KRW-PENGU,KRW-NEAR,KRW-ENA,KRW-MERL,KRW-H,KRW-BABY,KRW-TRUMP,KRW-APT,KRW-B3,KRW-SWAP,KRW-GALA,KRW-VVV,KRW-SAND,KRW-ATH,KRW-NIL,KRW-FIL,KRW-KSM,KRW-BIO,KRW-HBAR,KRW-TRX,KRW-CYS,KRW-SOON,KRW-ZBT,KRW-HOOK,KRW-IP,KRW-AGI,KRW-CHIP,KRW-D,KRW-HEMI,KRW-GWEI,KRW-SEI"
      - "--include"
      - "transactions,orderbook"
      - "--log-level"
      - "INFO"
    environment:
      MCTRADER_DATA_ROOT: /var/lib/mctrader/data
      MCTRADER_HEALTH_PORT: "8080"
      PYTHONUNBUFFERED: "1"
      # MCTRADER_NODE_ID: "collector-prod-1"   # uncomment to override hostname-based default
    volumes:
      - mctrader_data:/var/lib/mctrader/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health').status==200 else 1)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - mctrader-net
    # No `ports:` — HealthServer (8080) is internal only.
    # Outbound: pubwss.bithumb.com:443 (WS) + api.bithumb.com:443 (HTTPS).

volumes:
  mctrader_data:
    name: mctrader_data
    # Default driver = local. Backup recipe (host-side, ad-hoc):
    #   docker run --rm -v mctrader_data:/src -v "$(pwd)":/dst alpine \
    #     tar czf /dst/mctrader_data-$(date +%Y%m%d).tar.gz -C /src .
    # ADR-009 invariant: tick/orderbook = forward-only, backfill 불가 → 일 1회 backup 권장.

networks:
  mctrader-net:
    driver: bridge
