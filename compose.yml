# mctrader-data compose.yml — MCT-106 Phase C: ingester + compactor split
# ADR-033 §7.4 mandate preserved (restart policy, named volume, health check)
services:
  bithumb-ingester:
    build: .
    image: mctrader-data:pilot
    container_name: mctrader-ingester-bithumb
    restart: unless-stopped
    stop_grace_period: 30s
    command:
      - "collect"
      - "--symbols"
      - "KRW-XRP,KRW-SOL,KRW-VIRTUAL,KRW-DOGE,KRW-USDT,KRW-ETH,KRW-WLD,KRW-TON,KRW-ONDO,KRW-STRK,KRW-POLA,KRW-SUI,KRW-ADA,KRW-XLM,KRW-ETC,KRW-BTC,KRW-PEPE,KRW-SHIB,KRW-LINK,KRW-PENGU,KRW-NEAR,KRW-ENA,KRW-MERL,KRW-H,KRW-BABY,KRW-TRUMP,KRW-APT,KRW-B3,KRW-SWAP,KRW-GALA,KRW-VVV,KRW-SAND,KRW-ATH,KRW-NIL,KRW-FIL,KRW-KSM,KRW-BIO,KRW-HBAR,KRW-TRX,KRW-CYS,KRW-SOON,KRW-ZBT,KRW-HOOK,KRW-IP,KRW-AGI,KRW-CHIP,KRW-D,KRW-HEMI,KRW-GWEI,KRW-SEI"
      - "--include"
      - "transactions,orderbook,orderbook_snapshot"
      - "--log-level"
      - "INFO"
    environment:
      MCTRADER_DATA_ROOT: /var/lib/mctrader/data
      MCTRADER_NODE_ID: "NODE_BITHUMB_A"
      MCTRADER_HEALTH_PORT: "8080"
      PYTHONUNBUFFERED: "1"
    volumes:
      - mctrader_data:/var/lib/mctrader/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health').status==200 else 1)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - mctrader-net

  upbit-ingester:
    build: .
    image: mctrader-data:pilot
    container_name: mctrader-ingester-upbit
    restart: unless-stopped
    stop_grace_period: 30s
    command:
      - "collect"
      - "--exchange"
      - "upbit"
      - "--symbols"
      - "KRW-BTC,KRW-ETH,KRW-XRP,KRW-SOL,KRW-DOGE,KRW-ADA,KRW-TRX,KRW-LINK,KRW-AVAX,KRW-DOT,KRW-MATIC,KRW-ATOM,KRW-NEAR,KRW-SUI,KRW-HBAR,USDT-BTC,USDT-ETH,USDT-XRP,USDT-SOL,USDT-DOGE"
      - "--include"
      - "transactions,orderbook_snapshot"
      - "--log-level"
      - "INFO"
    environment:
      MCTRADER_DATA_ROOT: /var/lib/mctrader/data
      MCTRADER_NODE_ID: "NODE_UPBIT_A"
      MCTRADER_HEALTH_PORT: "8081"
      PYTHONUNBUFFERED: "1"
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    volumes:
      - mctrader_data:/var/lib/mctrader/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8081/health').status==200 else 1)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - mctrader-net
      - mctrader_net

  compactor:
    build: .
    image: mctrader-data:pilot
    container_name: mctrader-compactor
    restart: unless-stopped
    stop_grace_period: 30s
    command:
      - "compact"
      - "--root"
      - "/var/lib/mctrader/data"
      - "--log-level"
      - "INFO"
    environment:
      MCTRADER_DATA_ROOT: /var/lib/mctrader/data
      PYTHONUNBUFFERED: "1"
    volumes:
      - mctrader_data:/var/lib/mctrader/data
    depends_on:
      - bithumb-ingester
      - upbit-ingester
    healthcheck:
      test: ["CMD", "python", "-c", "import pathlib; pathlib.Path('/var/lib/mctrader/data/wal').exists() or exit(1)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - mctrader-net

volumes:
  mctrader_data:
    name: mctrader_data

networks:
  mctrader-net:
    driver: bridge
  mctrader_net:
    external: true
